name: uniloans
description: UniLoans - Your Home Loan Partner Document Scanner
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Document scanner (no version conflicts)
  flutter_doc_scanner: ^0.0.18

  # OCR - on device, no internet needed
  google_mlkit_text_recognition: ^0.11.0

  # Image filters
  image: ^4.1.3

  # PDF generation & preview
  pdf: ^3.10.8
  printing: ^5.11.0

  # Share documents
  share_plus: ^7.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.20

  # File system
  path_provider: ^2.1.2
  path: ^1.9.0

  # Google Drive & Sign-In
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  http: ^1.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.8

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/uniloans_icon_1024.png"
  adaptive_icon_background: "#0d1e5c"
  adaptive_icon_foreground: "assets/icon/uniloans_icon_1024.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
