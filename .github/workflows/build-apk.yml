name: Build UniLoans APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Python Pillow
        run: pip install Pillow

      - name: Ensure icon exists
        run: |
          mkdir -p assets/icon
          if [ ! -f assets/icon/uniloans_icon_1024.png ]; then
            python3 - << 'PYEOF'
from PIL import Image, ImageDraw
import os
os.makedirs('assets/icon', exist_ok=True)
img = Image.new('RGB', (1024, 1024), color=(13, 30, 92))
draw = ImageDraw.Draw(img)
draw.ellipse([200,200,824,824], fill=(21,96,212))
draw.ellipse([350,350,674,674], fill=(13,30,92))
draw.polygon([(512,180),(700,420),(324,420)], fill=(255,255,255))
img.save('assets/icon/uniloans_icon_1024.png')
print('Icon created')
PYEOF
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniLoans-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK size
        run: ls -lh build/app/outputs/flutter-apk/app-release.apk
