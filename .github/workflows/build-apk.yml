name: Build UniLoans APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Create icon if missing
        run: |
          mkdir -p assets/icon
          if [ ! -f assets/icon/uniloans_icon_1024.png ]; then
            pip install Pillow -q
            python3 -c "
from PIL import Image, ImageDraw
img = Image.new('RGB', (1024,1024), (13,30,92))
d = ImageDraw.Draw(img)
d.ellipse([200,200,824,824], fill=(21,96,212))
d.ellipse([350,350,674,674], fill=(13,30,92))
d.polygon([(512,180),(700,420),(324,420)], fill=(255,255,255))
img.save('assets/icon/uniloans_icon_1024.png')
print('Icon created successfully')
"
          else
            echo 'Icon already exists'
          fi
        continue-on-error: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: List APK files
        run: find build/app/outputs -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniLoans-APK
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Build success
        run: |
          echo "================================"
          echo "  UniLoans APK Build Complete!"
          echo "================================"
          ls -lh build/app/outputs/flutter-apk/
