name: Build UniLoans APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Make icon directory
        run: mkdir -p assets/icon

      - name: Create fallback icon
        run: |
          python3 -c "
from PIL import Image, ImageDraw
import os
if not os.path.exists('assets/icon/uniloans_icon_1024.png'):
    img = Image.new('RGB', (1024,1024), (13,30,92))
    d = ImageDraw.Draw(img)
    d.ellipse([200,200,824,824], fill=(21,96,212))
    d.ellipse([350,350,674,674], fill=(13,30,92))
    d.polygon([(512,180),(700,420),(324,420)], fill=(255,255,255))
    img.save('assets/icon/uniloans_icon_1024.png')
    print('icon created')
else:
    print('icon exists')
"
        continue-on-error: true

      - name: pub get
        run: flutter pub get

      - name: Generate icons
        run: dart run flutter_launcher_icons
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniLoans-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
