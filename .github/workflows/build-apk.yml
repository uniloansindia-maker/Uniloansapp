name: Build UniLoans APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Python PIL for icon fallback
        run: pip install Pillow

      - name: Ensure icon exists
        run: |
          mkdir -p assets/icon
          if [ ! -f assets/icon/uniloans_icon_1024.png ]; then
            echo "Generating fallback icon..."
            python3 - << 'PYEOF'
from PIL import Image, ImageDraw
import os
os.makedirs('assets/icon', exist_ok=True)
img = Image.new('RGB', (1024, 1024), color=(13, 30, 92))
draw = ImageDraw.Draw(img)
draw.ellipse([212,212,812,812], fill=(21,96,212))
draw.ellipse([312,312,712,712], fill=(13,30,92))
draw.polygon([(512,200),(680,400),(344,400)], fill=(255,255,255))
img.save('assets/icon/uniloans_icon_1024.png')
print("Fallback icon created")
PYEOF
          else
            echo "Icon already exists: $(ls -lh assets/icon/uniloans_icon_1024.png)"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icon
        run: dart run flutter_launcher_icons

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniLoans-APK-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: APK info
        run: |
          echo "========================================="
          echo "  UniLoans APK Build Complete!"
          echo "========================================="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo "Download from the Artifacts section above"
